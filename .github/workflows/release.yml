name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run type-check

      - name: Build Chrome
        run: npm run build

      - name: Build Firefox
        run: npm run build:firefox

      - name: Zip Chrome extension
        run: cd dist && zip -r ../foilguard-${{ github.ref_name }}.zip .

      - name: Zip Firefox extension
        run: cd dist-firefox && zip -r ../foilguard-firefox-${{ github.ref_name }}.zip .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            foilguard-${{ github.ref_name }}.zip
            foilguard-firefox-${{ github.ref_name }}.zip
          generate_release_notes: true
