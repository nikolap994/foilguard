<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
  <link rel="stylesheet" href="popup.css" />
  <title>FoilGuard</title>
</head>
<body>
  <div id="app">
    <header>
      <img id="logo-icon" width="16" height="16" alt="" class="logo-icon" />
      <span class="logo">FoilGuard</span>
      <div class="header-right">
        <button id="options-btn" type="button" title="Settings" class="icon-btn">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Scan result view (active tab has a result) -->
    <main id="view-result" class="hidden">
      <div id="score-wrap">
        <div id="score-circle" class="neutral">
          <span id="score-value">—</span>
        </div>
        <p id="domain-text"></p>
      </div>
      <p id="age-line" class="age-line hidden"></p>
      <ul id="reasons"></ul>
      <p id="safe-msg" class="hidden">No threats detected.</p>
      <div class="action-row">
        <button id="trust-btn" type="button" class="trust-btn hidden">Trust this domain</button>
        <button id="rescan-btn" type="button" class="rescan-btn hidden">Rescan ↺</button>
      </div>
    </main>

    <!-- Dashboard view (new tab, chrome:// pages, etc.) -->
    <main id="view-dashboard" class="hidden">
      <div class="dash-stats" id="dash-stats">
        <div class="stat-cell" id="stat-today">
          <span class="stat-num" id="stat-today-num">0</span>
          <span class="stat-label">blocked today</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-cell" id="stat-total">
          <span class="stat-num" id="stat-total-num">0</span>
          <span class="stat-label">total blocked</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-cell">
          <span class="stat-num" id="stat-streak">0</span>
          <span class="stat-label">day streak</span>
        </div>
      </div>

      <div class="quick-scan">
        <div class="qs-label">Check any domain</div>
        <div class="qs-row">
          <input id="qs-input" type="text" class="qs-input" placeholder="example.com" spellcheck="false" autocomplete="off" />
          <button id="qs-btn" type="button" class="qs-btn">Scan</button>
        </div>
        <div id="qs-result" class="qs-result hidden">
          <div class="qs-score-row">
            <div id="qs-circle" class="qs-circle"></div>
            <div class="qs-info">
              <p id="qs-domain" class="qs-domain"></p>
              <p id="qs-verdict" class="qs-verdict"></p>
            </div>
          </div>
          <ul id="qs-reasons" class="qs-reasons"></ul>
        </div>
      </div>

      <div class="recent-activity" id="recent-activity">
        <p class="recent-label">Recent blocks</p>
        <div id="recent-list" class="recent-list"></div>
        <p id="recent-empty" class="recent-empty hidden">No threats blocked yet — FoilGuard is active.</p>
      </div>
    </main>

    <!-- Audit panel (slide-up) -->
    <div id="audit-panel" class="hidden">
      <div class="audit-header">
        <span class="audit-title">Event log</span>
        <button id="export-json-btn" type="button" class="audit-export-btn">JSON</button>
        <button id="export-csv-btn" type="button" class="audit-export-btn">CSV</button>
      </div>
      <div id="audit-list"></div>
      <p id="audit-empty" class="hidden">No events recorded yet.</p>
    </div>

    <footer>
      <div class="footer-left">
        <button id="audit-toggle" type="button" title="Blocked sites log" aria-pressed="false" class="icon-btn footer-btn">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <rect x="1" y="2" width="12" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="1" y="6.25" width="12" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="1" y="10.5" width="8" height="1.5" rx="0.75" fill="currentColor"/>
          </svg>
          Log
        </button>
      </div>
      <a href="https://foillab.netlify.app" target="_blank" rel="noopener" class="footer-link">FoilLab →</a>
    </footer>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
